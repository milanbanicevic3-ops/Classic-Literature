<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#110800"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="My Library"/>
<title>100 Books · A Life's Reading Canon</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#F4A836;--gold-lt:#FFD580;--gold-dk:#8B5A22;
  --bg:#1E0F05;--bg2:#110800;--bg3:#2A1205;
  --wood1:#9B6830;--wood2:#5C3210;--wood3:#3B1D08;
  --text:#FFF3DC;--text2:#C8903C;--text3:#8B5A30;--text4:#4A2810;
  --t1:#F4A836;--t1s:#8B3A0F;
  --t2:#4DD98A;--t2s:#1A5C35;
  --t3:#4DB8E8;--t3s:#0D4A72;
  --t4:#C77DFF;--t4s:#4A1A80;
  --t5:#FF7F6B;--t5s:#7A2010;
}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  font-family:'Libre Baskerville',Georgia,serif;
  color:var(--text);
  min-height:100vh;
}

/* WOOD BG */
.wrap{
  background:
    repeating-linear-gradient(178deg,transparent 0,transparent 18px,rgba(0,0,0,.07) 18px,rgba(0,0,0,.07) 19px),
    linear-gradient(180deg,#3B1D08 0%,var(--bg) 100%);
  min-height:100vh;
}

/* ── HEADER ── */
header{
  background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);
  border-bottom:4px solid var(--wood2);
  position:relative;overflow:hidden;
}
header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--gold-lt) 50%,var(--gold) 70%,transparent);
}
.hdr-inner{
  max-width:1100px;margin:0 auto;padding:40px 48px 32px;
  display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;
}
.eyebrow{
  font-size:10px;letter-spacing:.4em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(32px,6vw,60px);font-weight:900;
  color:var(--text);line-height:1.0;
  text-shadow:0 2px 24px rgba(0,0,0,.7),0 0 60px rgba(244,168,54,.15);
}
h1 em{
  font-style:italic;font-weight:400;
  color:var(--text2);font-size:.54em;display:block;margin-top:6px;
}
.stats{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
.stat{
  background:rgba(0,0,0,.45);
  border:1px solid var(--wood2);border-top:2px solid var(--wood1);
  padding:12px 18px;text-align:center;min-width:74px;
}
.stat-num{
  font-family:'Playfair Display',serif;font-size:28px;font-weight:700;
  display:block;line-height:1;
}
.stat-lbl{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#7A5530;display:block;margin-top:4px;}
.plank{height:12px;background:linear-gradient(180deg,var(--wood1) 0%,var(--wood2) 60%,var(--wood3) 100%);box-shadow:0 6px 20px rgba(0,0,0,.7);}

/* ── CONTROLS ── */
.ctrl{
  position:sticky;top:0;z-index:100;
  background:rgba(17,8,0,.97);border-bottom:2px solid var(--wood3);
  padding:12px 48px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  backdrop-filter:blur(8px);
}
input[type=search]{
  flex:1;min-width:160px;
  background:var(--bg);border:1px solid var(--wood2);
  color:var(--text);padding:8px 14px;
  font-family:'Libre Baskerville',serif;font-size:13px;
  outline:none;transition:border-color .2s;border-radius:0;
  -webkit-appearance:none;
}
input[type=search]:focus{border-color:var(--gold);}
input[type=search]::placeholder{color:var(--text4);}
.btn{
  background:transparent;border:1px solid var(--wood3);color:#7A5530;
  padding:8px 12px;
  font-family:'Libre Baskerville',serif;font-size:10px;
  letter-spacing:.15em;text-transform:uppercase;
  cursor:pointer;transition:all .18s;white-space:nowrap;
  -webkit-appearance:none;border-radius:0;
}
.btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(244,168,54,.07);}
.btn.act{border-color:var(--gold);color:var(--text);background:rgba(244,168,54,.14);}

/* ── BODY ── */
.body{max-width:1100px;margin:0 auto;padding:36px 48px 80px;}

/* Banner */
.banner{
  background:linear-gradient(135deg,var(--bg3) 0%,var(--bg) 100%);
  border:1px solid #6B3E15;border-left:4px solid var(--gold);
  padding:20px 24px 20px 28px;margin-bottom:48px;position:relative;overflow:hidden;
}
.banner::before{
  content:'"';position:absolute;top:-16px;left:12px;
  font-family:'Playfair Display',serif;font-size:100px;
  color:var(--gold);opacity:.15;line-height:1;pointer-events:none;
}
.banner-ttl{font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.banner-txt{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--text2);line-height:1.85;}

/* Tier */
.tier{margin-bottom:50px;}
.tier-hdr{display:flex;align-items:center;gap:14px;padding-bottom:10px;margin-bottom:2px;}
.tier-hdr::after{content:'';flex:1;height:1px;background:currentColor;opacity:.2;}
.tier-lbl{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;}
.tier-sub{font-size:9px;letter-spacing:.25em;text-transform:uppercase;opacity:.55;}
.tier-cnt{font-family:'Playfair Display',serif;font-size:11px;opacity:.4;}
.rail{height:6px;margin-bottom:2px;opacity:.8;border-radius:0 0 2px 2px;}

/* Book row */
.book{
  display:grid;grid-template-columns:34px 5px 1fr auto;
  gap:0 12px;align-items:start;
  padding:12px 4px;
  border-bottom:1px solid rgba(74,40,16,.45);
  transition:background .15s;
}
.book:hover{background:rgba(244,168,54,.04);}
.bnum{
  font-family:'Playfair Display',serif;font-size:12px;
  color:var(--text4);padding-top:3px;text-align:right;font-weight:700;
}
.spine{border-radius:2px;align-self:stretch;min-height:26px;}
.btitle{
  font-family:'Playfair Display',serif;font-size:16px;font-weight:600;
  color:var(--text);line-height:1.25;margin-bottom:3px;
  transition:color .2s,text-decoration .2s;
}
.btitle.done{text-decoration:line-through;color:var(--text4);}
.bauth{font-size:12px;font-style:italic;color:var(--text3);margin-bottom:3px;}
.bnote{font-size:11px;color:#5C3C18;font-style:italic;line-height:1.5;}

/* Actions */
.acts{display:flex;gap:6px;padding-top:2px;flex-shrink:0;}
.ico{
  background:rgba(0,0,0,.35);border:1px solid var(--wood3);color:var(--text4);
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;transition:all .18s;
  text-decoration:none;border-radius:0;-webkit-appearance:none;
  font-family:inherit;
}
.ico:hover{border-color:var(--gold);color:var(--gold);background:rgba(244,168,54,.1);}
.ico.own{border-color:var(--t2);color:var(--t2);background:rgba(77,217,138,.09);}
.ico.rd {border-color:var(--gold);color:var(--gold);background:rgba(244,168,54,.14);}

.empty{
  text-align:center;padding:80px 20px;
  font-family:'Playfair Display',serif;font-size:20px;
  font-style:italic;color:var(--text4);
}

/* Progress bar */
.progress-wrap{height:3px;background:var(--wood3);margin-bottom:0;}
.progress-bar{height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-lt));transition:width .4s ease;}

/* ── MOBILE ── */
@media(max-width:640px){
  .hdr-inner,.ctrl,.body{padding-left:16px;padding-right:16px;}
  .hdr-inner{padding-top:28px;padding-bottom:24px;}
  .stats{gap:10px;}
  .stat{padding:10px 14px;min-width:64px;}
  .stat-num{font-size:22px;}
  .ctrl{padding-top:10px;padding-bottom:10px;gap:6px;position:sticky;}
  .book{grid-template-columns:26px 4px 1fr auto;gap:0 8px;}
  .btitle{font-size:15px;}
  .body{padding-top:24px;padding-bottom:60px;}
  h1{font-size:clamp(28px,8vw,44px);}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="hdr-inner">
    <div>
      <p class="eyebrow">Personal Library · Classical Literature</p>
      <h1>100 Books<em>A Life's Reading Canon</em></h1>
    </div>
    <div class="stats">
      <div class="stat"><span class="stat-num" id="s-total" style="color:var(--gold)">100</span><span class="stat-lbl">Total</span></div>
      <div class="stat"><span class="stat-num" id="s-owned" style="color:var(--t2)">0</span><span class="stat-lbl">Owned</span></div>
      <div class="stat"><span class="stat-num" id="s-read"  style="color:var(--gold-lt)">0</span><span class="stat-lbl">Read</span></div>
      <div class="stat"><span class="stat-num" id="s-left"  style="color:var(--t4)">100</span><span class="stat-lbl">Remaining</span></div>
    </div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="prog" style="width:0%"></div></div>
  <div class="plank"></div>
</header>

<!-- Controls -->
<div class="ctrl">
  <input type="search" id="srch" placeholder="Search title or author…" autocomplete="off"/>
  <button class="btn act" data-f="all">All</button>
  <button class="btn" data-f="owned">Owned</button>
  <button class="btn" data-f="read">Read</button>
  <button class="btn" data-f="unread">Unread</button>
  <button class="btn" data-t="1">T1</button>
  <button class="btn" data-t="2">T2</button>
  <button class="btn" data-t="3">T3</button>
  <button class="btn" data-t="4">T4</button>
  <button class="btn" data-t="5">T5</button>
</div>

<!-- Main content -->
<div class="body" id="main"></div>

</div><!-- wrap -->

<script>
const BOOKS=[
 {id:1,t:1,title:"The Brothers Karamazov",auth:"Fyodor Dostoevsky",note:"The summit of everything"},
 {id:2,t:1,title:"Crime and Punishment",auth:"Fyodor Dostoevsky"},
 {id:3,t:1,title:"War and Peace",auth:"Leo Tolstoy"},
 {id:4,t:1,title:"Don Quixote",auth:"Miguel de Cervantes"},
 {id:5,t:1,title:"The Divine Comedy",auth:"Dante Alighieri"},
 {id:6,t:1,title:"Hamlet",auth:"William Shakespeare"},
 {id:7,t:1,title:"King Lear",auth:"William Shakespeare"},
 {id:8,t:1,title:"Faust",auth:"Johann Wolfgang von Goethe"},
 {id:9,t:1,title:"The Odyssey",auth:"Homer"},
 {id:10,t:1,title:"Moby Dick",auth:"Herman Melville"},
 {id:11,t:2,title:"Anna Karenina",auth:"Leo Tolstoy"},
 {id:12,t:2,title:"The Idiot",auth:"Fyodor Dostoevsky"},
 {id:13,t:2,title:"Demons (The Possessed)",auth:"Fyodor Dostoevsky"},
 {id:14,t:2,title:"The Death of Ivan Ilyich",auth:"Leo Tolstoy",note:"Novella, 90 pages, devastating"},
 {id:15,t:2,title:"Notes from Underground",auth:"Fyodor Dostoevsky"},
 {id:16,t:2,title:"The Master and Margarita",auth:"Mikhail Bulgakov",note:"Power, corruption, and the Devil visiting Moscow"},
 {id:17,t:2,title:"Dead Souls",auth:"Nikolai Gogol"},
 {id:18,t:2,title:"Middlemarch",auth:"George Eliot",note:"Greatest English novel many people have never read"},
 {id:19,t:2,title:"One Hundred Years of Solitude",auth:"Gabriel García Márquez"},
 {id:20,t:2,title:"The Magic Mountain",auth:"Thomas Mann",note:"Ideology, disease, time, Europe before WWI"},
 {id:21,t:2,title:"The Trial",auth:"Franz Kafka"},
 {id:22,t:2,title:"Les Misérables",auth:"Victor Hugo",note:"Not the musical — a treatise on justice and power"},
 {id:23,t:2,title:"The Count of Monte Cristo",auth:"Alexandre Dumas",note:"Revenge, patience, long-game thinking at its finest"},
 {id:24,t:2,title:"Madame Bovary",auth:"Gustave Flaubert"},
 {id:25,t:2,title:"The Red and the Black",auth:"Stendhal",note:"Social ambition, class warfare"},
 {id:26,t:2,title:"The Stranger",auth:"Albert Camus"},
 {id:27,t:2,title:"The Plague",auth:"Albert Camus"},
 {id:28,t:2,title:"Bleak House",auth:"Charles Dickens",note:"The law as an engine of destruction"},
 {id:29,t:2,title:"Great Expectations",auth:"Charles Dickens"},
 {id:30,t:2,title:"Macbeth",auth:"William Shakespeare"},
 {id:31,t:3,title:"Blood Meridian",auth:"Cormac McCarthy",note:"Violent beyond anything you've read; philosophically massive"},
 {id:32,t:3,title:"The Road",auth:"Cormac McCarthy"},
 {id:33,t:3,title:"The Grapes of Wrath",auth:"John Steinbeck"},
 {id:34,t:3,title:"East of Eden",auth:"John Steinbeck"},
 {id:35,t:3,title:"The Great Gatsby",auth:"F. Scott Fitzgerald"},
 {id:36,t:3,title:"For Whom the Bell Tolls",auth:"Ernest Hemingway"},
 {id:37,t:3,title:"A Farewell to Arms",auth:"Ernest Hemingway"},
 {id:38,t:3,title:"The Old Man and the Sea",auth:"Ernest Hemingway",note:"About endurance and dignity, not fishing"},
 {id:39,t:3,title:"Catch-22",auth:"Joseph Heller",note:"Bureaucracy and institutional absurdity"},
 {id:40,t:3,title:"Invisible Man",auth:"Ralph Ellison"},
 {id:41,t:3,title:"Slaughterhouse-Five",auth:"Kurt Vonnegut"},
 {id:42,t:3,title:"Heart of Darkness",auth:"Joseph Conrad",note:"The original deconstruction of colonial mythology"},
 {id:43,t:3,title:"Lord of the Flies",auth:"William Golding"},
 {id:44,t:3,title:"1984",auth:"George Orwell"},
 {id:45,t:3,title:"Animal Farm",auth:"George Orwell"},
 {id:46,t:3,title:"Brave New World",auth:"Aldous Huxley"},
 {id:47,t:3,title:"Wuthering Heights",auth:"Emily Brontë"},
 {id:48,t:3,title:"Jane Eyre",auth:"Charlotte Brontë"},
 {id:49,t:3,title:"The Name of the Rose",auth:"Umberto Eco",note:"Medieval murder mystery wrapped in semiotics and theology"},
 {id:50,t:3,title:"If This Is a Man",auth:"Primo Levi",note:"One of the most important books written in the 20th century"},
 {id:51,t:3,title:"The Aeneid",auth:"Virgil"},
 {id:52,t:3,title:"Oedipus Rex",auth:"Sophocles"},
 {id:53,t:3,title:"Antigone",auth:"Sophocles",note:"The law of the state vs. the law of conscience"},
 {id:54,t:3,title:"The Oresteia",auth:"Aeschylus"},
 {id:55,t:3,title:"Paradise Lost",auth:"John Milton"},
 {id:56,t:3,title:"Gulliver's Travels",auth:"Jonathan Swift",note:"Not a children's book — savage political satire"},
 {id:57,t:3,title:"The Symposium",auth:"Plato"},
 {id:58,t:3,title:"A Tale of Two Cities",auth:"Charles Dickens"},
 {id:59,t:3,title:"The Sound and the Fury",auth:"William Faulkner"},
 {id:60,t:3,title:"As I Lay Dying",auth:"William Faulkner"},
 {id:61,t:4,title:"Dubliners",auth:"James Joyce",note:"Start here before Ulysses"},
 {id:62,t:4,title:"A Portrait of the Artist as a Young Man",auth:"James Joyce"},
 {id:63,t:4,title:"Ulysses",auth:"James Joyce",note:"Hardest book on this list — don't attempt without a guide"},
 {id:64,t:4,title:"Mrs Dalloway",auth:"Virginia Woolf"},
 {id:65,t:4,title:"To the Lighthouse",auth:"Virginia Woolf"},
 {id:66,t:4,title:"Lolita",auth:"Vladimir Nabokov",note:"Morally disturbing by design; the prose is the point"},
 {id:67,t:4,title:"Hunger",auth:"Knut Hamsun",note:"Proto-existentialist; obsession and willpower"},
 {id:68,t:4,title:"Pan",auth:"Knut Hamsun"},
 {id:69,t:4,title:"Kokoro",auth:"Natsume Soseki",note:"Honor, guilt, modernization"},
 {id:70,t:4,title:"Snow Country",auth:"Yasunari Kawabata"},
 {id:71,t:4,title:"The Tale of Genji",auth:"Murasaki Shikibu",note:"The world's first novel — 11th century Japan"},
 {id:72,t:4,title:"Buddenbrooks",auth:"Thomas Mann",note:"Dynasty decline across generations"},
 {id:73,t:4,title:"The Metamorphosis",auth:"Franz Kafka"},
 {id:74,t:4,title:"Nausea",auth:"Jean-Paul Sartre"},
 {id:75,t:4,title:"In Search of Lost Time, Vol. I",auth:"Marcel Proust",note:"Vol. I is complete in itself"},
 {id:76,t:4,title:"Resurrection",auth:"Leo Tolstoy"},
 {id:77,t:4,title:"Fathers and Sons",auth:"Ivan Turgenev",note:"Nihilism before Dostoevsky named it"},
 {id:78,t:4,title:"A Hero of Our Time",auth:"Mikhail Lermontov",note:"Pechorin is one of literature's great anti-heroes"},
 {id:79,t:4,title:"The Duel",auth:"Anton Chekhov",note:"Chekhov's deepest long-form work"},
 {id:80,t:4,title:"Othello",auth:"William Shakespeare"},
 {id:81,t:5,title:"The Tempest",auth:"William Shakespeare"},
 {id:82,t:5,title:"A Doll's House",auth:"Henrik Ibsen"},
 {id:83,t:5,title:"Hedda Gabler",auth:"Henrik Ibsen"},
 {id:84,t:5,title:"Oblomov",auth:"Ivan Goncharov",note:"The portrait of inertia as a way of life — deeply Russian"},
 {id:85,t:5,title:"The Sorrows of Young Werther",auth:"Johann Wolfgang von Goethe"},
 {id:86,t:5,title:"Candide",auth:"Voltaire",note:"Short, brutal satire of optimism — read in an afternoon"},
 {id:87,t:5,title:"The Hunchback of Notre-Dame",auth:"Victor Hugo"},
 {id:88,t:5,title:"Eugénie Grandet",auth:"Honoré de Balzac",note:"Obsession with money and control"},
 {id:89,t:5,title:"Père Goriot",auth:"Honoré de Balzac",note:"Ambition, Paris, social climbing"},
 {id:90,t:5,title:"Adventures of Huckleberry Finn",auth:"Mark Twain"},
 {id:91,t:5,title:"The Secret Agent",auth:"Joseph Conrad"},
 {id:92,t:5,title:"Under the Volcano",auth:"Malcolm Lowry",note:"Underread masterpiece; one day in a consul's disintegrating life"},
 {id:93,t:5,title:"Steppenwolf",auth:"Hermann Hesse"},
 {id:94,t:5,title:"Siddhartha",auth:"Hermann Hesse",note:"Short; useful counterbalance to Western ambition frameworks"},
 {id:95,t:5,title:"Doctor Zhivago",auth:"Boris Pasternak",note:"The Russian Revolution through a personal lens"},
 {id:96,t:5,title:"The Tin Drum",auth:"Günter Grass",note:"Germany confronting itself post-WWII"},
 {id:97,t:5,title:"Love in the Time of Cholera",auth:"Gabriel García Márquez"},
 {id:98,t:5,title:"The Alchemist",auth:"Paulo Coelho",note:"Lowest literary weight on the list, but culturally significant"},
 {id:99,t:5,title:"Resurrection",auth:"Leo Tolstoy"},
 {id:100,t:5,title:"The Red Badge of Courage",auth:"Stephen Crane",note:"War, cowardice, and self-deception; underrated"},
];

const TIER_META={
  1:{lbl:"Tier I",  sub:"Non-Negotiable",   c:"#F4A836",s:"#8B3A0F"},
  2:{lbl:"Tier II", sub:"Essential",        c:"#4DD98A",s:"#1A5C35"},
  3:{lbl:"Tier III",sub:"Outstanding",      c:"#4DB8E8",s:"#0D4A72"},
  4:{lbl:"Tier IV", sub:"Serious Reader",   c:"#C77DFF",s:"#4A1A80"},
  5:{lbl:"Tier V",  sub:"Complete the Canon",c:"#FF7F6B",s:"#7A2010"},
};

// ── State ──────────────────────────────────────────────
let owned = JSON.parse(localStorage.getItem('lib-owned')||'{}');
let read  = JSON.parse(localStorage.getItem('lib-read') ||'{}');
let filter='all', tierFilter=0, search='';

function save(){
  localStorage.setItem('lib-owned',JSON.stringify(owned));
  localStorage.setItem('lib-read', JSON.stringify(read));
}

function toggleOwned(id){
  owned[id]=!owned[id];
  if(!owned[id]) delete owned[id];
  save(); render();
}
function toggleRead(id){
  read[id]=!read[id];
  if(!read[id]){ delete read[id]; }
  else { owned[id]=true; } // auto-mark owned when read
  save(); render();
}

function amazonUrl(title,auth){
  return 'https://www.amazon.com/s?k='+encodeURIComponent(title+' '+auth);
}

// ── Filter ─────────────────────────────────────────────
function getFiltered(){
  return BOOKS.filter(b=>{
    if(tierFilter && b.t!==tierFilter) return false;
    if(filter==='owned'  && !owned[b.id]) return false;
    if(filter==='read'   && !read[b.id])  return false;
    if(filter==='unread' &&  read[b.id])  return false;
    if(search){
      const q=search.toLowerCase();
      if(!b.title.toLowerCase().includes(q)&&!b.auth.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

// ── Render ─────────────────────────────────────────────
function render(){
  const ownedCount=Object.keys(owned).length;
  const readCount =Object.keys(read).length;

  document.getElementById('s-owned').textContent=ownedCount;
  document.getElementById('s-read').textContent =readCount;
  document.getElementById('s-left').textContent =100-readCount;
  document.getElementById('prog').style.width   =(readCount)+'%';

  const filtered=getFiltered();
  const byTier={};
  [1,2,3,4,5].forEach(t=>{ byTier[t]=filtered.filter(b=>b.t===t); });

  const main=document.getElementById('main');
  let html='';

  // Banner (only on default view)
  if(filter==='all'&&!search&&!tierFilter){
    html+=`<div class="banner">
      <p class="banner-ttl">Recommended Starting Order</p>
      <p class="banner-txt">Begin with The Brothers Karamazov — the logical step from Crime &amp; Punishment.
      Then The Master and Margarita as a palate cleanser. Then The Count of Monte Cristo for narrative pleasure
      with serious depth underneath. Then Blood Meridian when ready for something genuinely disturbing in a
      productive way. Ten to fifteen years at the right pace.</p>
    </div>`;
  }

  let anyVisible=false;
  [1,2,3,4,5].forEach(tier=>{
    const tb=byTier[tier];
    if(!tb||!tb.length) return;
    anyVisible=true;
    const m=TIER_META[tier];
    html+=`<div class="tier">
      <div class="tier-hdr" style="color:${m.c}">
        <span class="tier-lbl">${m.lbl}</span>
        <span class="tier-sub">${m.sub}</span>
        <span class="tier-cnt">${tb.length} books</span>
      </div>
      <div class="rail" style="background:linear-gradient(90deg,${m.s},${m.c}55,transparent)"></div>`;

    tb.forEach(b=>{
      const isOwned=!!owned[b.id];
      const isRead =!!read[b.id];
      html+=`<div class="book">
        <span class="bnum">${b.id}</span>
        <div class="spine" style="background:linear-gradient(180deg,${m.c} 0%,${m.s} 100%)"></div>
        <div>
          <p class="btitle${isRead?' done':''}">${b.title}</p>
          <p class="bauth">${b.auth}</p>
          ${b.note?`<p class="bnote">${b.note}</p>`:''}
        </div>
        <div class="acts">
          <a class="ico" href="${amazonUrl(b.title,b.auth)}" target="_blank" rel="noopener" title="Search on Amazon">↗</a>
          <button class="ico${isOwned?' own':''}" onclick="toggleOwned(${b.id})" title="${isOwned?'Remove from shelf':'Add to shelf'}">${isOwned?'✓':'○'}</button>
          <button class="ico${isRead?' rd':''}"   onclick="toggleRead(${b.id})"  title="${isRead?'Mark unread':'Mark as read'}">${isRead?'★':'☆'}</button>
        </div>
      </div>`;
    });
    html+='</div>';
  });

  if(!anyVisible){
    html+='<div class="empty">No books match your current selection.</div>';
  }

  main.innerHTML=html;
}

// ── Controls wiring ────────────────────────────────────
document.querySelectorAll('[data-f]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    filter=btn.dataset.f;
    document.querySelectorAll('[data-f]').forEach(b=>b.classList.remove('act'));
    btn.classList.add('act');
    render();
  });
});

const TIER_COLORS={1:'#F4A836',2:'#4DD98A',3:'#4DB8E8',4:'#C77DFF',5:'#FF7F6B'};
document.querySelectorAll('[data-t]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const t=parseInt(btn.dataset.t);
    if(tierFilter===t){
      tierFilter=0;
      btn.classList.remove('act');
      btn.style.borderColor='';btn.style.color='';btn.style.background='';
    } else {
      document.querySelectorAll('[data-t]').forEach(b=>{
        b.classList.remove('act');b.style.borderColor='';b.style.color='';b.style.background='';
      });
      tierFilter=t;
      btn.classList.add('act');
      const c=TIER_COLORS[t];
      btn.style.borderColor=c;btn.style.color=c;btn.style.background=c+'18';
    }
    render();
  });
});

document.getElementById('srch').addEventListener('input',e=>{
  search=e.target.value;
  render();
});

// ── Init ───────────────────────────────────────────────
render();
</script>
</body>
</html>
